height:100%;

z-index:5;

bottom:30px;
left:50%;
transform:translateX(-50%);
width:33vw;
max-width:400px;
text-align:center;
padding:10px 20px;

font-family:sans-serif;
font-size:14px;
border-radius:20px;
z-index:20;
display:none;
}

// ===== FUNCTIONS =====

function showMedia(file){

container.innerHTML = "";

if(file.endsWith(".mp4")){

const video = document.createElement("video");
video.src = file;
video.autoplay = true;
video.loop = true;
video.playsInline = true;
video.controls = true;
video.style.opacity = 0;

container.appendChild(video);

// fade in
setTimeout(() => {
video.style.opacity = 1;
}, 50);

}else{

const img = document.createElement("img");
img.src = file;
img.style.opacity = 0;

container.appendChild(img);

// fade in
setTimeout(() => {
img.style.opacity = 1;
}, 50);

}

}

function startTimer(startTime){

function update(){

const elapsed = Date.now() - startTime;
const remaining = Math.max(0, Math.ceil((cooldown - elapsed)/1000));

timerElement.textContent = remaining;

}

update();
setInterval(update, 1000);

}

// ===== CLICK ACTION =====

startScreen.addEventListener("click", () => {

let savedMedia = localStorage.getItem("media");
let savedTime = localStorage.getItem("media_time");

let mediaToShow;
let startTime;

// ===== COOLDOWN CHECK =====
if(savedMedia && savedTime && (Date.now() - savedTime < cooldown)){

mediaToShow = savedMedia;
startTime = parseInt(savedTime);

}else{

mediaToShow = medias[Math.floor(Math.random() * medias.length)];
startTime = Date.now();

localStorage.setItem("media", mediaToShow);
localStorage.setItem("media_time", startTime);

}

// ===== DETECT CLASS =====
let animationFile;

if(mediaToShow.includes("_C1")) animationFile = "animation1.mp4";
if(mediaToShow.includes("_C2")) animationFile = "animation2.mp4";
if(mediaToShow.includes("_C3")) animationFile = "animation3.mp4";
if(mediaToShow.includes("_C4")) animationFile = "animation4.mp4";

// ===== DISPLAY =====
startScreen.style.display = "none";

// ===== PLAY ANIMATION =====
animation.src = animationFile;
animation.style.display = "block";

animation.onended = () => {

animation.style.display = "none";
showMedia(mediaToShow);

document.getElementById("cooldown").style.display = "block";

animation.muted = true;
animation.playsInline = true;

};

// ===== START TIMER =====
startTimer(startTime);

});
